name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Sync dependencies
        run: uv sync --group dev --frozen

      - name: Lint
        run: just lint-ci

      - name: Tests with coverage
        run: just cov
